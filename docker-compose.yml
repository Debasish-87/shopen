services:

  postgres:
    image: postgres:15
    container_name: shopen-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: shopen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - shopen-network


  redis:
    image: redis:7.2
    container_name: shopen-redis
    restart: unless-stopped

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

    networks:
      - shopen-network


  backend:
    build: ./backend
    container_name: shopen-backend
    restart: unless-stopped

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      PORT: 8080
      ENV: development

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: shopen
      DB_SSLMODE: disable

      REDIS_ADDR: redis:6379

      JWT_SECRET: supersecret
      JWT_EXPIRY_HOURS: 24
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123

    networks:
      - shopen-network
      - monitoring_shopen-monitoring


  frontend:
    build: ./frontend
    container_name: shopen-frontend
    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend

    networks:
      - shopen-network


volumes:
  postgres_data:
  redis_data:


networks:
  shopen-network:
  monitoring_shopen-monitoring:
    external: true